name: Deploy to Pages

# Publishes the currently-parked build to GitHub Pages on every push to main.
# The parked filename is read from the README "Currently parked:" line, copied
# to index.html, and served at the repo's Pages URL, so the public link stays
# stable even though each build has a date-stamped filename.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy the parked build to index.html
        run: |
          set -euo pipefail
          mkdir -p _site
          LIVE=$(grep -oE 'sooks-saga-scroll-[0-9]{8}-[0-9]+\.html' README.md | head -1)
          if [ -z "$LIVE" ] || [ ! -f "$LIVE" ]; then
            echo "::error::Could not resolve the parked build from README.md (got '$LIVE')"
            exit 1
          fi
          echo "Publishing $LIVE as index.html"
          cp "$LIVE" _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
